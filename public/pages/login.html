<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Learnix</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<header class="navbar">
  <a href="/pages/home.html" class="logo">
    <span class="logo-icon">Learn</span>
    <span class="logo-text">Learnix</span>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="/pages/home.html">Home</a></li>
      <li><a href="/pages/courses.html">Courses</a></li>
      <li><a href="/pages/about.html">About</a></li>
    </ul>
  </nav>
  <div class="nav-actions">
    <a href="/pages/signup.html" class="sign-up">Sign Up</a>
  </div>
</header>

<main>
  <section class="hero">
    <div class="transform-banner"><span>Welcome Back</span></div>
    <h1>Log in to <span class="journey">Learnix</span></h1>
    <p class="subtitle">Use your email and password to sign in. The platform admin can log in directly without selecting a role.</p>

    <form class="demo-form" id="loginForm" action="/login" method="post">
      <input type="email" name="username" id="loginEmail" placeholder="Email Address" required>
      <input type="password" name="password" id="loginPassword" placeholder="Password" required>

      <div class="show-password-toggle">
        <input type="checkbox" id="showPwd" onchange="document.getElementById('loginPassword').type = this.checked ? 'text' : 'password'">
        <label for="showPwd">Show Password</label>
      </div>

      <select name="role" id="loginRole">
        <option value="" disabled selected>Select Role</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="university">University</option>
      </select>

      <select name="branch" id="loginBranch" style="display:none;">
        <option value="" disabled selected>Select Branch</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Data Science">Data Science</option>
        <option value="Information Technology">Information Technology</option>
        <option value="Electronics">Electronics</option>
        <option value="Mechanical">Mechanical</option>
      </select>

      <button type="submit" class="get-started-free">Log In</button>
    </form>

    <div id="loginError" class="status-msg error" style="display:none;"></div>

    <p style="margin-top:20px; text-align:center; color: var(--text-muted); font-size:0.9rem;">
      Don't have an account?
      <a href="/pages/signup.html" style="color:var(--blue); font-weight:700;">Sign up free</a>
    </p>
  </section>
</main>

<footer><p>&copy; 2025 Learnix. All rights reserved.</p></footer>

<script src="/assets/js/main.js"></script>
<script>
  const loginError = document.getElementById('loginError');
  const loginRole = document.getElementById('loginRole');
  const loginBranch = document.getElementById('loginBranch');
  const defaultBranches = [
    'Computer Science',
    'Data Science',
    'Information Technology',
    'Electronics',
    'Mechanical'
  ];
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    loginError.textContent = decodeURIComponent(params.get('error'));
    loginError.style.display = 'block';
  }

  function populateBranchOptions(branches) {
    loginBranch.innerHTML = '<option value="" disabled selected>Select Branch</option>';
    branches.forEach((branchName) => {
      const option = document.createElement('option');
      option.value = branchName;
      option.textContent = branchName;
      loginBranch.appendChild(option);
    });
  }

  function syncBranchVisibility() {
    const needsBranch = loginRole.value === 'student' || loginRole.value === 'teacher';
    loginBranch.style.display = needsBranch ? 'block' : 'none';
    loginBranch.required = needsBranch;
    if (!needsBranch) loginBranch.value = '';
  }

  document.getElementById('loginForm').addEventListener('submit', (event) => {
    const email = (document.getElementById('loginEmail').value || '').trim().toLowerCase();
    const password = document.getElementById('loginPassword').value || '';
    const isAdminLogin = email === 'admin@gmail.com' && password === 'Admin@123';
    if (!isAdminLogin && !loginRole.value) {
      event.preventDefault();
      loginError.textContent = 'Please select a role before logging in.';
      loginError.style.display = 'block';
      return;
    }
    loginError.style.display = 'none';
  });

  loginRole.addEventListener('change', syncBranchVisibility);
  syncBranchVisibility();

  fetch('/api/departments')
    .then((r) => r.ok ? r.json() : Promise.reject(new Error('Failed to load branches')))
    .then((data) => {
      const branches = (data.departments || [])
        .map((dept) => dept.dept_name)
        .filter(Boolean);
      populateBranchOptions(branches.length ? branches : defaultBranches);
    })
    .catch(() => {
      populateBranchOptions(defaultBranches);
      if (loginRole.value === 'student' || loginRole.value === 'teacher') {
        loginError.textContent = 'Using default branch list because the database branch list is unavailable.';
        loginError.style.display = 'block';
      }
    });
</script>
</body>
</html>
