<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Learnix</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<header class="navbar">
  <a href="/pages/home.html" class="logo">
    <span class="logo-icon">📖</span>
    <span class="logo-text">Learnix</span>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="/pages/home.html">Home</a></li>
      <li><a href="/pages/courses.html">Courses</a></li>
      <li><a href="/pages/about.html">About</a></li>
    </ul>
  </nav>
  <div class="nav-actions">
    <a href="/pages/signup.html" class="sign-up">Sign Up</a>
  </div>
</header>

<main>
  <section class="hero">
    <div class="transform-banner"><span>Welcome Back 👋</span></div>
    <h1>Log in to <span class="journey">Learnix</span></h1>
    <p class="subtitle">Continue your learning journey.</p>

    <form class="demo-form" id="loginForm" action="/login" method="post">
      <input type="email" name="username" id="loginEmail" placeholder="Email Address" required>
      <input type="password" name="password" id="loginPassword" placeholder="Password" required>

      <div class="show-password-toggle">
        <input type="checkbox" id="showPwd" onchange="document.getElementById('loginPassword').type = this.checked ? 'text' : 'password'">
        <label for="showPwd">👁 Show Password</label>
      </div>

      <select name="role" required>
        <option value="" disabled selected>Select Role</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>

      <input type="text" name="department" id="deptInput" placeholder="Department" required>
      <datalist id="deptList"></datalist>

      <div style="text-align:center; color:var(--text-muted); font-weight:700;">OTP is required for login</div>
      <div style="display:grid; grid-template-columns:1fr auto; gap:12px;">
        <input type="text" name="otp" id="loginOtpInput" placeholder="Enter 5-digit OTP" pattern="[0-9]{5}" maxlength="5" required>
        <button type="button" id="sendLoginOtpBtn" class="get-started-free" style="white-space:nowrap;">Send OTP</button>
      </div>

      <button type="submit" class="get-started-free">Log In</button>
    </form>

    <div id="loginError" class="status-msg error" style="display:none;"></div>

    <p style="margin-top:20px; text-align:center; color: var(--text-muted); font-size:0.9rem;">
      Don't have an account?
      <a href="/pages/signup.html" style="color:var(--blue); font-weight:700;">Sign up free</a>
    </p>
  </section>
</main>

<footer><p>&copy; 2025 Learnix. All rights reserved.</p></footer>

<script src="/assets/js/main.js"></script>
<script>
  const loginError = document.getElementById('loginError');

  function showLoginStatus(message, type) {
    loginError.textContent = message;
    loginError.className = 'status-msg ' + (type || '');
    loginError.style.display = 'block';
  }

  async function readJsonResponse(res) {
    const raw = await res.text();
    try {
      return raw ? JSON.parse(raw) : {};
    } catch (_err) {
      const cleaned = raw.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      throw new Error(cleaned || `Request failed with status ${res.status}`);
    }
  }

  // Load departments as suggestions
  fetch('/api/departments').then(r => r.json()).then(data => {
    const list = document.getElementById('deptList');
    const input = document.getElementById('deptInput');
    if (list && data.departments) {
      data.departments.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.dept_name;
        list.appendChild(opt);
      });
      input.setAttribute('list', 'deptList');
    }
  }).catch(() => {});

  // Handle form errors from server redirect
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    showLoginStatus(decodeURIComponent(params.get('error')), 'error');
  }

  function getLoginOtpPayload(includeOtp) {
    const email = document.getElementById('loginEmail').value.trim();
    const role = document.querySelector('select[name="role"]').value;
    const department = document.getElementById('deptInput').value.trim();
    const otp = document.getElementById('loginOtpInput').value.trim();

    if (!email || !role || !department) {
      showLoginStatus('Enter email, role, and department before using OTP login.', 'error');
      return null;
    }
    if (includeOtp && !otp) {
      showLoginStatus('Enter the 5-digit OTP sent to your email.', 'error');
      return null;
    }

    return includeOtp ? { email, role, department, otp } : { email, role, department };
  }

  document.getElementById('sendLoginOtpBtn').addEventListener('click', async () => {
    const payload = getLoginOtpPayload(false);
    if (!payload) return;

    try {
      const res = await fetch('/api/login-otp/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await readJsonResponse(res);
      if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
      showLoginStatus('OTP sent. Enter it in the OTP field, then click Log In.', 'success');
    } catch (err) {
      showLoginStatus(err.message || 'Failed to send OTP.', 'error');
    }
  });
</script>
</body>
</html>
