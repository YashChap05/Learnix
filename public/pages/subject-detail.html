  const subjectKey = new URLSearchParams(window.location.search).get("subject");
  const subject = SUBJECTS[subjectKey];
  const enrollBtn = document.getElementById("enrollBtn");
  const enrollMsg = document.getElementById("enrollMsg");
  const openLessonsBtn = document.getElementById("openLessonsBtn");

  function addEnrolledFlag(url) {
    return url + (url.includes("?") ? "&" : "?") + "enrolled=1";
  }

  function lessonPageUrl() {
    return "/pages/subject-learning.html?subject=" + subjectKey;
  }

  function showLessonsButton(useEnrolledFlag) {
    openLessonsBtn.href = useEnrolledFlag ? addEnrolledFlag(lessonPageUrl()) : lessonPageUrl();
    openLessonsBtn.style.display = "inline-block";
  }

  function renderSubject() {
    if (!subject) {
      document.getElementById("subjectTitle").textContent = "Subject Not Found";
      document.getElementById("subjectDescription").textContent = "This subject page is not available yet. Please return to the courses page and choose another subject.";
      enrollBtn.style.display = "none";
      openLessonsBtn.style.display = "none";
      return;
    }

    document.title = subject.name + " | Learnix";
    document.getElementById("subjectYear").textContent = subject.year;
    document.getElementById("subjectTitle").textContent = subject.name;
    document.getElementById("subjectDescription").textContent = subject.description;
    document.getElementById("subjectHighlights").innerHTML = subject.highlights.map(item => `<span>${item}</span>`).join("");
    document.getElementById("subjectStats").innerHTML = `
      <div><strong>Duration</strong><span>${subject.duration}</span></div>
      <div><strong>Mode</strong><span>${subject.mode}</span></div>
      <div><strong>Level</strong><span>${subject.level}</span></div>
    `;
    document.getElementById("subjectOutcomes").innerHTML = subject.outcomes.map(item => `<li>${item}</li>`).join("");
    document.getElementById("subjectAudience").innerHTML = subject.audience.map(item => `<li>${item}</li>`).join("");
  }

  function wireAuth() {
    fetch("/api/me", { credentials: "same-origin" })
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(user => {
        document.getElementById("navActions").innerHTML = `
          <div class="profile-menu">
            <button id="profileTrigger" class="profile-trigger" type="button">${user.email || "My Account"}</button>
            <div id="profileDropdown" class="profile-dropdown">
              <div class="profile-email">${user.email || ""}</div>
              <a href="/dashboard" class="profile-item">📊 Dashboard</a>
              <a href="/profile" class="profile-item">👤 My Profile</a>
              <a href="/logout" class="profile-item" style="color:#dc2626;">Sign Out</a>
            </div>
          </div>
        `;
        const trigger = document.getElementById("profileTrigger");
        const dropdown = document.getElementById("profileDropdown");
        trigger.addEventListener("click", () => dropdown.classList.toggle("open"));
        document.addEventListener("click", e => {
          if (!dropdown.contains(e.target) && e.target !== trigger) dropdown.classList.remove("open");
        });

        if (new URLSearchParams(window.location.search).get("enrolled") === "1") {
          enrollBtn.textContent = "Enrolled";
          enrollBtn.style.background = "var(--green)";
          enrollBtn.disabled = true;
          showLessonsButton(true);
          return;
        }

        return fetch("/api/my-courses", { credentials: "same-origin" })
          .then(res => { if (!res.ok) throw new Error(); return res.json(); })
          .then(data => {
            const enrolledCourses = Array.isArray(data.courses) ? data.courses : [];
            const isEnrolled = enrolledCourses.some(course =>
              String(course.course_name || "").trim().toLowerCase() === String(subject.name || "").trim().toLowerCase()
            );
            if (isEnrolled) {
              enrollBtn.textContent = "Enrolled";
              enrollBtn.style.background = "var(--green)";
              enrollBtn.disabled = true;
              showLessonsButton(true);
            }
          });
      })
      .catch(() => {});
  }

  async function handleEnroll() {
    if (!subject) return;

    const authRes = await fetch("/api/me", { credentials: "same-origin" });
    if (!authRes.ok) {
      window.location.href = "/pages/login.html";
      return;
    }

    enrollBtn.textContent = "Enrolling...";
    enrollBtn.disabled = true;

    try {
      const res = await fetch("/api/enroll", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ courseName: subject.name })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Enrollment failed");

      enrollBtn.textContent = "Enrolled";
      enrollBtn.style.background = "var(--green)";
      enrollMsg.textContent = data.alreadyEnrolled
        ? "You are already enrolled in this subject."
        : "Enrollment successful. Your subject is ready to open.";
      enrollMsg.className = "status-msg success";
      enrollMsg.style.display = "block";
      showLessonsButton(true);
    } catch (error) {
      enrollBtn.textContent = "Enroll Now";
      enrollBtn.disabled = false;
      enrollMsg.textContent = error.message;
      enrollMsg.className = "status-msg error";
      enrollMsg.style.display = "block";
    }
  }

  enrollBtn.addEventListener("click", handleEnroll);
  renderSubject();
  wireAuth();
</script>
