<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Learnix</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<header class="navbar">
  <a href="/pages/home.html" class="logo">
    <span class="logo-icon">Learn</span>
    <span class="logo-text">Learnix</span>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="/pages/home.html">Home</a></li>
      <li><a href="/pages/courses.html">Courses</a></li>
      <li><a href="/pages/about.html">About</a></li>
    </ul>
  </nav>
  <div class="nav-actions">
    <a href="/pages/login.html" class="sign-in">Log In</a>
  </div>
</header>

<main>
  <section class="hero">
    <div class="transform-banner"><span>Create Your Account</span></div>
    <h1>Join <span class="journey">Learnix</span></h1>
    <p class="subtitle">Choose your role and fill in only the fields that match you.</p>

    <div class="signup-tabs" id="signupTabs">
      <button type="button" class="signup-tab active" data-role="student">Student</button>
      <button type="button" class="signup-tab" data-role="teacher">Teacher</button>
      <button type="button" class="signup-tab" data-role="university">University</button>
    </div>

    <form id="signupForm" class="demo-form" action="/signup" method="post">
      <input type="hidden" name="role" id="roleInput" value="student">

      <div class="signup-panel active" data-panel="student">
        <input type="text" name="username" placeholder="Student Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <select name="branch" id="studentBranch" required>
          <option value="" disabled selected>Select Branch</option>
        </select>
        <input type="text" name="university_name" id="studentUniversity" placeholder="University" list="universityList" required>
      </div>

      <div class="signup-panel" data-panel="teacher">
        <input type="text" data-name="username" placeholder="Teacher Name">
        <input type="email" data-name="email" placeholder="Email Address">
        <select data-name="branch" id="teacherBranch">
          <option value="" disabled selected>Select Branch</option>
        </select>
        <input type="text" data-name="university_name" id="teacherUniversity" placeholder="University" list="universityList">
        <input type="text" data-name="subject" placeholder="Subject (Optional)">
      </div>

      <div class="signup-panel" data-panel="university">
        <input type="text" data-name="university_name" placeholder="University Name">
        <input type="email" data-name="email" placeholder="University Email">
        <input type="text" data-name="principal_name" placeholder="Principal Name">
      </div>

      <input type="password" name="password" placeholder="Password (min. 6 characters)" minlength="6" required>
      <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit" class="get-started-free">Create Account</button>
    </form>

    <datalist id="universityList"></datalist>

    <p style="margin-top:20px; text-align:center; color:var(--text-muted); font-size:0.9rem;">
      Already have an account?
      <a href="/pages/login.html" style="color:var(--blue); font-weight:700;">Log in here</a>
    </p>
  </section>
</main>

<footer><p>&copy; 2025 Learnix. All rights reserved.</p></footer>

<script src="/assets/js/main.js"></script>
<script>
  const roleInput = document.getElementById('roleInput');
  const tabs = [...document.querySelectorAll('.signup-tab')];
  const panels = [...document.querySelectorAll('.signup-panel')];

  function syncPanelFields(activeRole) {
    panels.forEach((panel) => {
      const isActive = panel.dataset.panel === activeRole;
      panel.classList.toggle('active', isActive);

      panel.querySelectorAll('input, select').forEach((input) => {
        const mappedName = input.dataset.name || input.getAttribute('name');
        if (isActive) {
          input.setAttribute('name', mappedName);
          const isOptionalTeacherSubject = activeRole === 'teacher' && mappedName === 'subject';
          input.required = !isOptionalTeacherSubject;
        } else {
          input.removeAttribute('name');
          input.required = false;
          input.value = '';
        }
      });
    });
  }

  function setRole(role) {
    roleInput.value = role;
    tabs.forEach((tab) => tab.classList.toggle('active', tab.dataset.role === role));
    syncPanelFields(role);
  }

  tabs.forEach((tab) => {
    tab.addEventListener('click', () => setRole(tab.dataset.role));
  });

  fetch('/api/departments').then((r) => r.json()).then((data) => {
    const studentBranch = document.getElementById('studentBranch');
    const teacherBranch = document.getElementById('teacherBranch');
    (data.departments || []).forEach((dept) => {
      const studentOption = document.createElement('option');
      studentOption.value = dept.dept_name;
      studentOption.textContent = dept.dept_name;
      studentBranch.appendChild(studentOption);

      const teacherOption = document.createElement('option');
      teacherOption.value = dept.dept_name;
      teacherOption.textContent = dept.dept_name;
      teacherBranch.appendChild(teacherOption);
    });
  }).catch(() => {});

  fetch('/api/universities').then((r) => r.json()).then((data) => {
    const universityList = document.getElementById('universityList');
    (data.universities || []).forEach((university) => {
      const option = document.createElement('option');
      option.value = university.university_name;
      universityList.appendChild(option);
    });
  }).catch(() => {});

  setRole('student');
</script>
</body>
</html>
