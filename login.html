<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Learnix</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .show-password-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .show-password-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2563eb;
        }

        .show-password-toggle label {
            cursor: pointer;
            font-size: 14px;
            color: #1f2937;
            font-weight: 500;
            margin: 0;
        }

        .show-password-toggle label:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span class="logo-icon">📖</span>
        <span class="logo-text">Learnix</span>
    </div>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="Courses.html">Courses</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="nav-actions">
        <a href="login.html" class="sign-in">Log in</a>
    </div>
</header>

<main>
    <section class="hero">
        <div class="transform-banner">
            <span>Welcome Back</span>
        </div>

        <h1>
            <span class="journey">Login</span> to
            <span class="today">Learnix</span>
        </h1>

        <p class="subtitle">
            Continue your learning journey by signing in to your account.
        </p>

        <form class="demo-form" id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            
            <div class="show-password-toggle">
                <input type="checkbox" id="showPasswordToggle" onchange="toggleShowPassword()">
                <label for="showPasswordToggle">👁 Show Password</label>
            </div>
            
            <button type="submit" class="get-started-free">Log in</button>
        </form>

        <div id="loginSuccess" style="display:none; color:#22c55e; margin-top:18px; font-weight:600;">
            Login successful! Redirecting...
        </div>

        <div id="loginError" style="display:none; color:#dc2626; margin-top:18px; font-weight:600;">
            Invalid email or password.
        </div>

        <p style="margin-top:20px; text-align:center; color:#6b7280;">
            Don't have an account? <a href="signup.html" style="color:#2563eb; font-weight:600; text-decoration:none;">Sign up</a>
        </p>
    </section>
</main>

<footer>
    <p>&copy; 2023 Learnix. All rights reserved.</p>
</footer>

<script>
function toggleShowPassword() {
    const showPasswordCheckbox = document.getElementById('showPasswordToggle');
    const loginPassword = document.getElementById('loginPassword');
    const type = showPasswordCheckbox.checked ? 'text' : 'password';
    
    loginPassword.type = type;
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const successMsg = document.getElementById('loginSuccess');
    const errorMsg = document.getElementById('loginError');
    
    // Reset messages
    successMsg.style.display = 'none';
    errorMsg.style.display = 'none';
    
    // Send login request
    fetch('/api/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            successMsg.style.display = 'block';
            // Redirect after 1.5 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            errorMsg.style.display = 'block';
            errorMsg.textContent = data.error || 'Login failed.';
        }
    })
    .catch(err => {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Error: ' + err.message;
    });
});
</script>

</body>
</html>
